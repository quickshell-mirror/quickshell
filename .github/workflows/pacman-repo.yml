name: Sync & Build

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: master
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: quickshell-mirror/quickshell
          upstream_sync_branch: master

  build:
    needs: sync
    runs-on: archlinux
    container: archlinux
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pacman --noconfirm --noprogressbar -Syyu
          pacman --noconfirm --noprogressbar -Sy \
            base-devel \
            cmake \
            ninja \
            pkgconf \
            qt6-base \
            qt6-declarative \
            qt6-svg \
            qt6-wayland \
            qt6-shadertools \
            wayland-protocols \
            wayland \
            libdrm \
            vulkan-headers \
            libxcb \
            libpipewire \
            cli11 \
            polkit \
            jemalloc \
            libunwind \
            libxkbcommon \
            gbm \
            egl-wayland \
            gobject-introspection \
            bluez \
            libbluetooth \
            upower \
            polkit-gnome \
            libnm \
            python \
            git

      - name: Build
        run: |
          cmake -GNinja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDISTRIBUTOR="GitHub Actions (custom)"
          cmake --build build -j$(nproc)

      - name: Create package
        run: |
          cd build
          DESTDIR=./pkgdir ninja install

          mkdir -p pkg
          cd pkg

          mkdir -p usr/bin
          mkdir -p usr/share/applications
          mkdir -p usr/share/icons/hicolor/scalable/apps

          cp -r ../pkgdir/usr/bin/* usr/bin/ 2>/dev/null || true
          cp -r ../pkgdir/usr/share/* usr/share/ 2>/dev/null || true

          cat > .PKGINFO << EOF
          pkgname = quickshell-git
          pkgbase = quickshell-git
          pkgver = 0.2.1.r$(git rev-parse --short HEAD)
          pkgrel = 1
          pkgdesc = Flexible toolkit for making desktop shells with QtQuick
          arch = x86_64
          license = LGPL3
          depend = qt6-declarative
          depend = qt6-base
          depend = jemalloc
          depend = qt6-svg
          depend = libpipewire
          depend = libxcb
          depend = wayland
          depend = libdrm
          depend = mesa
          depend = cpptrace
          depend = vulkan-headers
          depend = polkit
          optdepend = libxkbcommon
          optdepend = gbm
          optdepend = egl-wayland
          optdepend = gobject-introspection
          optdepend = bluez
          optdepend = libbluetooth
          optdepend = upower
          optdepend = polkit-gnome
          optdepend = libnm
          provides = quickshell
          conflicts = quickshell
          maintainer = GitHub Actions <actions@github.com>
          EOF

          tar --create --file - . | gzip -9n > .MTREE

          tar --create --file ../quickshell-git-0.2.1.r$(git rev-parse --short HEAD)-1-x86_64.pkg.tar.zst -C .. pkg

      - name: Setup gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
        continue-on-error: true

      - name: Create repo
        run: |
          mkdir -p repo/x86_64
          cp build/quickshell-git-*.pkg.tar.zst repo/x86_64/
          
          cd repo
          cd x86_64
          tar --create --file - *.zst | gzip -9 > ../quickshell-git.db.tar.gz
          cd ..
          
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Quickshell Repo</title></head>
          <body>
          <h1>Quickshell Custom Repository</h1>
          <p>Add to /etc/pacman.conf:</p>
          <pre>
          [quickshell]
          Server = https://rust-frog.github.io/quickshell/$arch
          </pre>
          </body>
          </html>
          EOF

      - name: Push to gh-pages
        run: |
          git checkout gh-pages || git checkout -b gh-pages
          rm -rf x86_64 *.tar.* index.html 2>/dev/null || true
          mkdir -p x86_64
          cp ../build/quickshell-git-*.pkg.tar.zst x86_64/
          
          cd x86_64
          tar --create --file - *.zst | gzip -9 > ../quickshell-git.db.tar.gz
          cd ..
          
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Quickshell Repo</title></head>
          <body>
          <h1>Quickshell Custom Repository</h1>
          <p>Add to /etc/pacman.conf:</p>
          <pre>
          [quickshell]
          Server = https://rust-frog.github.io/quickshell/$arch
          </pre>
          </body>
          </html>
          EOF
          
          git add -A
          git commit -m "Update quickshell-git package" || echo "No changes"
          git push -f origin gh-pages
